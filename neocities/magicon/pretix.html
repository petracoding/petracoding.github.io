<!doctype html>
<html lang="de" xml:lang="de">
  <head>
    <title>pretix shop</title>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />

    <style>
      @font-face {
        font-family: "IM FELL English";
        src:
          url("/neocities/magicon/fonts/IM_FELL_English_Roman.woff2") format("woff2"),
          url("/neocities/magicon/fonts/IM_FELL_English_Roman.woff") format("woff"),
          url("/neocities/magicon/fonts/IM_FELL_English_Roman.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: "IM FELL English", serif;
        font-size: 17px;
        line-height: 1;
        color: #16110d;
        cursor:
          url("https://cur.cursors-4u.net/user/use-1/use3.cur") 0 0,
          auto;
        line-height: 1.75;
      }

      .pretix-widget .pretix-widget-item-title {
        font-size: 20px;
      }

      .pretix-widget del.pretix-widget-pricebox-original-price {
        display: none;
      }

      button {
        font-family: "IM FELL English", serif;
        font-size: 18px !important;
      }

      .pretix-widget-attribution {
        display: none;
      }
    </style>
    <link rel="stylesheet" type="text/css" href="https://pretix.eu/magicon/2026/widget/v2.css" crossorigin />
    <script type="text/javascript" src="https://pretix.eu/widget/v2.de.js" async crossorigin></script>
  </head>
  <body>
    <pretix-widget event="https://pretix.eu/magicon/2026/"></pretix-widget>
    <noscript>
      <div class="pretix-widget">
        <div class="pretix-widget-info-message">
          JavaScript ist in Ihrem Browser deaktiviert. Um unseren Ticketshop ohne JavaScript aufzurufen, klicken Sie bitte
          <a target="_blank" rel="noopener" href="https://pretix.eu/magicon/2026/">hier</a>.
        </div>
      </div>
    </noscript>
  </body>
</html>
